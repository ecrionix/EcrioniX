<script>
const API = 'https://elangovan369-ecrionix-verilog.hf.space/run';

// ── Example codes ──────────────────────────────────────────
const EXAMPLES = {
  and: `module and_gate(input a, b, output y);
  assign y = a & b;
endmodule

module tb;
  reg a, b; wire y;
  and_gate uut(.a(a),.b(b),.y(y));
  initial begin
    $dumpfile("dump.vcd"); $dumpvars(0, tb);
    a=0;b=0; #10;
    a=0;b=1; #10;
    a=1;b=0; #10;
    a=1;b=1; #10;
    $display("AND gate simulation complete");
    $finish;
  end
  always @(a,b)
    $display("t=%0t | a=%b b=%b | y=%b", $time, a, b, y);
endmodule`,

  dff: `module dff(input clk, rst, d, output reg q);
  always @(posedge clk or posedge rst)
    if (rst) q <= 0;
    else     q <= d;
endmodule

module tb;
  reg clk=0, rst=1, d=0; wire q;
  dff uut(.clk(clk),.rst(rst),.d(d),.q(q));
  always #5 clk = ~clk;
  initial begin
    $dumpfile("dump.vcd"); $dumpvars(0, tb);
    #12 rst=0;
    #10 d=1;
    #10 d=0;
    #10 d=1;
    #10 d=1;
    #10 d=0;
    #20 $display("D Flip-Flop simulation complete");
    $finish;
  end
  always @(posedge clk)
    $display("t=%0t | clk↑ | d=%b → q=%b", $time, d, q);
endmodule`,

  counter: `module counter4(input clk, rst, output reg [3:0] count);
  always @(posedge clk or posedge rst)
    if (rst) count <= 0;
    else     count <= count + 1;
endmodule

module tb;
  reg clk=0, rst=1; wire [3:0] count;
  counter4 uut(.clk(clk),.rst(rst),.count(count));
  always #5 clk = ~clk;
  initial begin
    $dumpfile("dump.vcd"); $dumpvars(0, tb);
    #12 rst=0;
    #200;
    $display("Final count = %0d", count);
    $finish;
  end
  always @(posedge clk)
    $display("t=%0t | count = %0d (%04b)", $time, count, count);
endmodule`,

  adder: `module full_adder(input a, b, cin, output sum, cout);
  assign {cout, sum} = a + b + cin;
endmodule

module tb;
  reg a,b,cin; wire sum,cout;
  full_adder uut(.a(a),.b(b),.cin(cin),.sum(sum),.cout(cout));
  integer i;
  initial begin
    $display("a b cin | sum cout");
    $display("--------|----------");
    for(i=0;i<8;i=i+1) begin
      {a,b,cin} = i; #5;
      $display("%b %b  %b  |  %b    %b", a,b,cin,sum,cout);
    end
    $finish;
  end
endmodule`,

  mux: `module mux4to1(input [3:0] d, input [1:0] sel, output y);
  assign y = d[sel];
endmodule

module tb;
  reg [3:0] d; reg [1:0] sel; wire y;
  mux4to1 uut(.d(d),.sel(sel),.y(y));
  initial begin
    d = 4'b1010;
    $display("Data = %b", d);
    sel=0; #5; $display("sel=%b → y=%b", sel, y);
    sel=1; #5; $display("sel=%b → y=%b", sel, y);
    sel=2; #5; $display("sel=%b → y=%b", sel, y);
    sel=3; #5; $display("sel=%b → y=%b", sel, y);
    $finish;
  end
endmodule`,

  fsm: `// Simple 2-state FSM: detects sequence "1"
module fsm(input clk, rst, in, output reg out);
  parameter S0=0, S1=1;
  reg state;
  always @(posedge clk or posedge rst) begin
    if (rst) begin state<=S0; out<=0; end
    else case(state)
      S0: if(in) begin state<=S1; out<=1; end
          else   begin state<=S0; out<=0; end
      S1: if(in) begin state<=S1; out<=1; end
          else   begin state<=S0; out<=0; end
    endcase
  end
endmodule

module tb;
  reg clk=0,rst=1,in=0; wire out;
  fsm uut(.clk(clk),.rst(rst),.in(in),.out(out));
  always #5 clk=~clk;
  initial begin
    $dumpfile("dump.vcd"); $dumpvars(0,tb);
    #12 rst=0;
    #10 in=1; #10 in=0; #10 in=1;
    #10 in=1; #10 in=0; #10;
    $display("FSM simulation complete");
    $finish;
  end
  always @(posedge clk)
    $display("t=%0t | in=%b → out=%b", $time, in, out);
endmodule`
};

// ── Editor setup ───────────────────────────────────────────
const editor = document.getElementById('code-editor');
const lineNums = document.getElementById('line-nums');

function updateLineNumbers() {
  const lines = editor.value.split('\n').length;
  lineNums.innerHTML = Array.from({length:lines},(_,i)=>i+1).join('<br>');
}

editor.addEventListener('input', updateLineNumbers);
editor.addEventListener('scroll', () => { lineNums.scrollTop = editor.scrollTop; });
editor.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart, end = editor.selectionEnd;
    editor.value = editor.value.substring(0,s) + '  ' + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = s + 2;
    updateLineNumbers();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); runCode(); }
});

function loadExample(name) {
  editor.value = EXAMPLES[name];
  updateLineNumbers();
  setStatus('idle', `Loaded: ${name} example`);
  document.getElementById('console-output').innerHTML = '<span class="console-placeholder">// Click Run to execute...</span>';
}

function clearEditor() {
  editor.value = '';
  updateLineNumbers();
  document.getElementById('console-output').innerHTML = '<span class="console-placeholder">// Output will appear here after clicking Run...</span>';
  setStatus('idle', 'Ready');
  resetWaveform();
}

// ── Tab switching ──────────────────────────────────────────
function switchTab(name, el) {
  document.querySelectorAll('.out-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.out-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
}

// ── Status bar ─────────────────────────────────────────────
function setStatus(state, msg) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = 'status-dot' + (state==='ok'?' ok':state==='err'?' err':state==='running'?' running':'');
  txt.textContent = msg;
}

// ── Run ────────────────────────────────────────────────────
async function runCode() {
  const code = editor.value.trim();
  if (!code) { setStatus('err','No code to run'); return; }

  const btn = document.getElementById('run-btn');
  const spinner = document.getElementById('spinner');
  btn.disabled = true;
  spinner.style.display = 'block';
  setStatus('running', 'Compiling...');
  const t0 = Date.now();

  const out = document.getElementById('console-output');
  out.innerHTML = '<span class="console-line-info">// Sending to Icarus Verilog...</span>\n';

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({code})
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const elapsed = ((Date.now()-t0)/1000).toFixed(2);
    document.getElementById('status-time').textContent = `${elapsed}s`;

    out.innerHTML = '';

    if (!data.success && data.stage === 'compile') {
      out.innerHTML += `<span class="console-line-err">── Compilation Error ──────────────────\n${escHtml(data.stderr)}</span>`;
      setStatus('err', 'Compilation failed');
    } else {
      if (data.stderr) {
        out.innerHTML += `<span class="console-line-warn">── Warnings ───────────────────────────\n${escHtml(data.stderr)}\n</span>`;
      }
      if (data.stdout) {
        out.innerHTML += `<span class="console-line-ok">── Simulation Output ──────────────────\n</span>`;
        out.innerHTML += escHtml(data.stdout);
      } else {
        out.innerHTML += `<span class="console-line-info">// No $display output. Add $display statements to see results.</span>`;
      }
      setStatus('ok', `Simulation complete — ${elapsed}s`);

      if (data.vcd) {
        renderWaveform(data.vcd);
        out.innerHTML += `\n<span class="console-line-info">// Waveform generated — click "Waveform" tab to view</span>`;
      } else {
        resetWaveform();
      }
    }
  } catch(e) {
    out.innerHTML = `<span class="console-line-err">── Connection Error ────────────────────\n${escHtml(e.message)}\n\nMake sure the EcrioniX compiler service is online.</span>`;
    setStatus('err', 'Connection failed');
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
  }
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── VCD Parser & Waveform Renderer ─────────────────────────
function parseVCD(vcd) {
  const signals = {};
  const timeline = [];
  let currentTime = 0;
  const idMap = {};

  for (const line of vcd.split('\n')) {
    const t = line.trim();
    if (!t) continue;

    const varMatch = t.match(/\$var\s+\w+\s+(\d+)\s+(\S+)\s+(\S+)/);
    if (varMatch) {
      const [,bits,id,name] = varMatch;
      idMap[id] = name;
      if (!signals[name]) signals[name] = {bits:parseInt(bits), values:[]};
      continue;
    }
    if (t.startsWith('#')) {
      currentTime = parseInt(t.slice(1));
      continue;
    }
    const scalarMatch = t.match(/^([01xz])(\S+)$/);
    if (scalarMatch) {
      const [,val,id] = scalarMatch;
      const name = idMap[id];
      if (name) signals[name].values.push({t:currentTime, v:val});
      continue;
    }
    const vecMatch = t.match(/^b([01xz]+)\s+(\S+)$/);
    if (vecMatch) {
      const [,val,id] = vecMatch;
      const name = idMap[id];
      if (name) signals[name].values.push({t:currentTime, v:val});
    }
  }
  return signals;
}

function renderWaveform(vcd) {
  const signals = parseVCD(vcd);
  const names = Object.keys(signals).filter(n => !['dump'].includes(n));
  if (!names.length) { resetWaveform(); return; }

  document.getElementById('waveform-placeholder').style.display = 'none';
  const canvas = document.getElementById('waveform-canvas');
  canvas.style.display = 'block';

  const ROW_H = 36, LABEL_W = 110, PAD = 16;
  const H = names.length * ROW_H + PAD * 2;

  // find max time
  let maxT = 0;
  names.forEach(n => signals[n].values.forEach(v => { if(v.t > maxT) maxT = v.t; }));
  if (!maxT) maxT = 100;

  const panelW = document.getElementById('waveform-panel').clientWidth - 20;
  const W = Math.max(panelW, 500);
  canvas.width = W; canvas.height = H;
  const WAVE_W = W - LABEL_W - PAD;

  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#060c1a';
  ctx.fillRect(0,0,W,H);

  // grid lines
  for (let i = 0; i <= 10; i++) {
    const x = LABEL_W + (i / 10) * WAVE_W;
    ctx.strokeStyle = 'rgba(56,189,248,0.06)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    if (i > 0) {
      ctx.fillStyle = '#4b6380';
      ctx.font = '9px JetBrains Mono, monospace';
      ctx.fillText(Math.round(maxT * i / 10), x + 2, H - 3);
    }
  }

  names.forEach((name, row) => {
    const y = PAD + row * ROW_H;
    const sig = signals[name];
    const vals = sig.values;

    // label
    ctx.fillStyle = '#7dd3fc';
    ctx.font = '11px JetBrains Mono, monospace';
    ctx.textAlign = 'right';
    ctx.fillText(name.slice(0,14), LABEL_W - 8, y + ROW_H/2 + 4);

    if (!vals.length) return;

    const tX = t => LABEL_W + (t / maxT) * WAVE_W;
    const isBus = sig.bits > 1;
    const HIGH_Y = y + 4, LOW_Y = y + ROW_H - 6, MID_Y = y + ROW_H/2;

    ctx.strokeStyle = isBus ? '#2dd4bf' : '#38bdf8';
    ctx.lineWidth = 1.5;
    ctx.beginPath();

    for (let i = 0; i < vals.length; i++) {
      const {t, v} = vals[i];
      const nextT = i+1 < vals.length ? vals[i+1].t : maxT;
      const x1 = tX(t), x2 = tX(nextT);

      if (isBus) {
        // bus: draw as thick band with value label
        ctx.fillStyle = 'rgba(45,212,191,0.15)';
        ctx.fillRect(x1, HIGH_Y, x2-x1, LOW_Y-HIGH_Y);
        ctx.strokeStyle = '#2dd4bf';
        ctx.strokeRect(x1, HIGH_Y, x2-x1, LOW_Y-HIGH_Y);
        if (x2-x1 > 20) {
          ctx.fillStyle = '#5eead4';
          ctx.font = '9px JetBrains Mono, monospace';
          ctx.textAlign = 'center';
          ctx.fillText(parseInt(v,2)||v, (x1+x2)/2, MID_Y+3);
        }
      } else {
        const curY = v==='1' ? HIGH_Y : (v==='0' ? LOW_Y : MID_Y);
        const prevY = i===0 ? LOW_Y : (vals[i-1].v==='1' ? HIGH_Y : LOW_Y);
        if (i===0) { ctx.moveTo(x1, curY); }
        else { ctx.lineTo(x1, prevY); ctx.lineTo(x1, curY); }
        ctx.lineTo(x2, curY);
      }
    }
    if (!isBus) ctx.stroke();
    ctx.beginPath(); // reset for next signal
  });

  ctx.textAlign = 'left';
}

function resetWaveform() {
  document.getElementById('waveform-placeholder').style.display = 'flex';
  const canvas = document.getElementById('waveform-canvas');
  canvas.style.display = 'none';
}
