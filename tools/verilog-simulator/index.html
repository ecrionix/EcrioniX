<script>
const API = 'https://elangovan369-ecrionix-verilog.hf.space/run';

const EXAMPLES = {
  counter:`module counter4(input clk, rst, output reg [3:0] count);
  always @(posedge clk or posedge rst)
    if (rst) count <= 0;
    else     count <= count + 1;
endmodule

module tb;
  reg clk=0, rst=1; wire [3:0] count;
  counter4 uut(.clk(clk),.rst(rst),.count(count));
  always #5 clk = ~clk;
  initial begin
    $dumpfile("dump.vcd"); $dumpvars(0, tb);
    #12 rst = 0;
    #200;
    $display("Final count = %0d", count);
    $finish;
  end
  always @(posedge clk)
    $display("t=%0t | count = %0d (%04b)", $time, count, count);
endmodule`,

  dff:`module dff(input clk, rst, d, output reg q);
  always @(posedge clk or posedge rst)
    if (rst) q <= 0;
    else     q <= d;
endmodule

module tb;
  reg clk=0, rst=1, d=0; wire q;
  dff uut(.clk(clk),.rst(rst),.d(d),.q(q));
  always #5 clk = ~clk;
  initial begin
    $dumpfile("dump.vcd"); $dumpvars(0, tb);
    #12 rst=0; #10 d=1; #10 d=0;
    #10 d=1; #10 d=1; #10 d=0;
    #20 $display("D FF simulation done"); $finish;
  end
  always @(posedge clk)
    $display("t=%0t | d=%b → q=%b", $time, d, q);
endmodule`,

  adder:`module full_adder(input a, b, cin, output sum, cout);
  assign {cout, sum} = a + b + cin;
endmodule

module tb;
  reg a,b,cin; wire sum,cout;
  full_adder uut(.a(a),.b(b),.cin(cin),.sum(sum),.cout(cout));
  integer i;
  initial begin
    $display("a b cin | sum cout");
    $display("--------|----------");
    for(i=0;i<8;i=i+1) begin
      {a,b,cin}=i; #5;
      $display("%b %b  %b  |  %b    %b",a,b,cin,sum,cout);
    end
    $finish;
  end
endmodule`,

  and:`module and_tb;
  reg a,b; wire y;
  assign y = a & b;
  initial begin
    $dumpfile("dump.vcd"); $dumpvars;
    $display("a b | y");
    a=0;b=0;#10;$display("%b %b | %b",a,b,y);
    a=0;b=1;#10;$display("%b %b | %b",a,b,y);
    a=1;b=0;#10;$display("%b %b | %b",a,b,y);
    a=1;b=1;#10;$display("%b %b | %b",a,b,y);
    $finish;
  end
endmodule`,

  mux:`module mux4to1(input [3:0] d, input [1:0] sel, output y);
  assign y = d[sel];
endmodule

module tb;
  reg [3:0] d; reg [1:0] sel; wire y;
  mux4to1 uut(.d(d),.sel(sel),.y(y));
  initial begin
    d=4'b1010;
    $display("Data = %b", d);
    sel=0;#5;$display("sel=%b → y=%b",sel,y);
    sel=1;#5;$display("sel=%b → y=%b",sel,y);
    sel=2;#5;$display("sel=%b → y=%b",sel,y);
    sel=3;#5;$display("sel=%b → y=%b",sel,y);
    $finish;
  end
endmodule`,

  fsm:`module fsm(input clk,rst,in, output reg out);
  reg state;
  always @(posedge clk or posedge rst)
    if(rst) begin state<=0; out<=0; end
    else case(state)
      0: begin state<=in; out<=in; end
      1: begin state<=in; out<=in; end
    endcase
endmodule

module tb;
  reg clk=0,rst=1,in=0; wire out;
  fsm uut(.clk(clk),.rst(rst),.in(in),.out(out));
  always #5 clk=~clk;
  initial begin
    $dumpfile("dump.vcd"); $dumpvars(0,tb);
    #12 rst=0;
    #10 in=1;#10 in=0;#10 in=1;#10 in=1;#10 in=0;#10;
    $display("FSM done"); $finish;
  end
  always @(posedge clk)
    $display("t=%0t | in=%b out=%b",$time,in,out);
endmodule`
};

// ── Editor ─────────────────────────────────────────────────
const ed = document.getElementById('editor');
const ln = document.getElementById('lnums');

function updateLines(){
  const n = ed.value.split('\n').length;
  ln.innerHTML = Array.from({length:n},(_,i)=>i+1).join('<br>');
}
ed.addEventListener('input', updateLines);
ed.addEventListener('scroll', ()=>{ ln.scrollTop = ed.scrollTop; });
ed.addEventListener('keydown', e=>{
  if(e.key==='Tab'){
    e.preventDefault();
    const s=ed.selectionStart;
    ed.value=ed.value.slice(0,s)+'  '+ed.value.slice(ed.selectionEnd);
    ed.selectionStart=ed.selectionEnd=s+2;
    updateLines();
  }
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();runCode();}
});

function load(name, btn){
  ed.value = EXAMPLES[name];
  updateLines();
  document.querySelectorAll('.ex-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  setStatus('idle','Ready');
  document.getElementById('console').innerHTML='<span class="dim">// Click Run or press Ctrl+Enter...</span>';
}

function clearAll(){
  ed.value=''; updateLines();
  document.getElementById('console').innerHTML='<span class="dim">// Output will appear here...</span>';
  document.querySelectorAll('.ex-btn').forEach(b=>b.classList.remove('active'));
  resetWave(); setStatus('idle','Ready');
  document.getElementById('status-time').textContent='';
}

// ── Tabs ───────────────────────────────────────────────────
function switchTab(name,el){
  document.querySelectorAll('.out-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.out-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
}

// ── Status ─────────────────────────────────────────────────
function setStatus(state,msg){
  const d=document.getElementById('dot');
  d.className='dot'+(state==='ok'?' ok':state==='err'?' err':state==='run'?' run':'');
  document.getElementById('status-msg').textContent=msg;
}

// ── Run ────────────────────────────────────────────────────
async function runCode(){
  const code=ed.value.trim();
  if(!code){setStatus('err','No code');return;}
  const btn=document.getElementById('run-btn');
  const sp=document.getElementById('spin');
  btn.disabled=true; sp.style.display='block';
  setStatus('run','Compiling...');
  const t0=Date.now();
  const con=document.getElementById('console');
  con.innerHTML='<span class="info">Sending to Icarus Verilog...</span>\n';
  try{
    const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code})});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const d=await res.json();
    const ms=((Date.now()-t0)/1000).toFixed(2)+'s';
    document.getElementById('status-time').textContent=ms;
    con.innerHTML='';
    if(!d.success&&d.stage==='compile'){
      con.innerHTML+=`<span class="err">── Compile Error ──────────────────────\n${esc(d.stderr)}</span>`;
      setStatus('err','Compilation failed');
    } else {
      if(d.stderr) con.innerHTML+=`<span class="warn">── Warnings ────────────────────────────\n${esc(d.stderr)}\n</span>`;
      if(d.stdout) con.innerHTML+=`<span class="ok">── Output ──────────────────────────────\n</span>${esc(d.stdout)}`;
      else con.innerHTML+=`<span class="info">// No $display output.</span>`;
      setStatus('ok',`Done — ${ms}`);
      if(d.vcd){ renderWave(d.vcd); con.innerHTML+='\n<span class="info">// Waveform ready — click Waveform tab</span>'; }
      else resetWave();
    }
  }catch(e){
    con.innerHTML=`<span class="err">── Error ───────────────────────────────\n${esc(e.message)}</span>`;
    setStatus('err','Failed');
  }finally{btn.disabled=false;sp.style.display='none';}
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── VCD + Waveform ─────────────────────────────────────────
function parseVCD(vcd){
  const sigs={}, idMap={};
  let t=0;
  for(const line of vcd.split('\n')){
    const l=line.trim();
    const vm=l.match(/\$var\s+\w+\s+(\d+)\s+(\S+)\s+(\S+)/);
    if(vm){idMap[vm[2]]=vm[3];if(!sigs[vm[3]])sigs[vm[3]]={bits:+vm[1],vals:[]};continue;}
    if(l.startsWith('#')){t=+l.slice(1);continue;}
    const sm=l.match(/^([01xz])(\S+)$/);
    if(sm){const n=idMap[sm[2]];if(n)sigs[n].vals.push({t,v:sm[1]});continue;}
    const bm=l.match(/^b([01xz]+)\s+(\S+)$/);
    if(bm){const n=idMap[bm[2]];if(n)sigs[n].vals.push({t,v:bm[1]});}
  }
  return sigs;
}

function renderWave(vcd){
  const sigs=parseVCD(vcd);
  const names=Object.keys(sigs);
  if(!names.length){resetWave();return;}
  document.getElementById('wave-empty').style.display='none';
  const cv=document.getElementById('wave-canvas');
  cv.style.display='block';
  const ROW=38,LW=100,PAD=12;
  let maxT=0;
  names.forEach(n=>sigs[n].vals.forEach(v=>{if(v.t>maxT)maxT=v.t;}));
  if(!maxT)maxT=100;
  const WW=Math.max(document.getElementById('waveform-wrap').clientWidth-30,400);
  cv.width=WW; cv.height=names.length*ROW+PAD*2;
  const WS=WW-LW-PAD;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#060c1a';ctx.fillRect(0,0,WW,cv.height);
  for(let i=0;i<=10;i++){
    const x=LW+(i/10)*WS;
    ctx.strokeStyle='rgba(56,189,248,0.06)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,cv.height);ctx.stroke();
    if(i>0){ctx.fillStyle='#3d5166';ctx.font='9px JetBrains Mono,monospace';ctx.textAlign='left';ctx.fillText(Math.round(maxT*i/10),x+2,cv.height-4);}
  }
  names.forEach((name,row)=>{
    const y=PAD+row*ROW,sig=sigs[name],vals=sig.vals;
    ctx.fillStyle='#7dd3fc';ctx.font='11px JetBrains Mono,monospace';ctx.textAlign='right';
    ctx.fillText(name.slice(0,12),LW-6,y+ROW/2+4);
    if(!vals.length)return;
    const tx=t=>LW+(t/maxT)*WS;
    const isBus=sig.bits>1;
    const HY=y+5,LY=y+ROW-7;
    ctx.strokeStyle=isBus?'#2dd4bf':'#38bdf8';ctx.lineWidth=1.5;
    ctx.beginPath();
    for(let i=0;i<vals.length;i++){
      const{t,v}=vals[i],nT=i+1<vals.length?vals[i+1].t:maxT;
      const x1=tx(t),x2=tx(nT);
      if(isBus){
        ctx.fillStyle='rgba(45,212,191,0.12)';ctx.fillRect(x1,HY,x2-x1,LY-HY);
        ctx.strokeStyle='#2dd4bf';ctx.strokeRect(x1,HY,x2-x1,LY-HY);
        if(x2-x1>18){ctx.fillStyle='#5eead4';ctx.font='9px JetBrains Mono,monospace';ctx.textAlign='center';ctx.fillText(parseInt(v,2),(x1+x2)/2,y+ROW/2+3);}
      } else {
        const cy=v==='1'?HY:LY,py=i===0?LY:(vals[i-1].v==='1'?HY:LY);
        if(i===0)ctx.moveTo(x1,cy);else{ctx.lineTo(x1,py);ctx.lineTo(x1,cy);}
        ctx.lineTo(x2,cy);
      }
    }
    if(!isBus)ctx.stroke();
    ctx.beginPath();
  });
  ctx.textAlign='left';
}

function resetWave(){
  document.getElementById('wave-empty').style.display='flex';
  document.getElementById('wave-canvas').style.display='none';
}

// Init
load('counter', document.querySelector('.ex-btn'));
setStatus('idle','Ready  ·  Ctrl+Enter to run');
</script>
